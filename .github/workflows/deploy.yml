name: Deploy to VPS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./WishListServer/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/wishlist-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/wishlist-api:latest

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/wishlist-api"
            CONTAINER_NAME="${{ secrets.APP_NAME }}"
            
            echo "Pulling new image..."
            docker pull $IMAGE_NAME:latest

            echo "Stopping old container..."
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            echo "Starting new container..."
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              --network app-network \
              -p 8080:8080 \
              -v /home/wishlist/app-data/images:/app/src/assets/images \
              -e ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION_STRING }}" \
              $IMAGE_NAME:latest

            echo "Cleaning up..."
            docker image prune -f

            echo "Done!"
            docker ps --filter "name=$CONTAINER_NAME"
